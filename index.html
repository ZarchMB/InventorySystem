<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>InventoryFB</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #1e293b;
    }
    .container { max-width: 600px; margin: 0 auto; width: 100%; }

    .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .app-header h1 {
      font-size: 1.8rem; font-weight: 700;
      background: linear-gradient(135deg, #4a86e8, #6c5ce7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .connection-status { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #64748b; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #10b981; box-shadow: 0 0 0 2px rgba(16,185,129,0.2); transition: background 0.3s; }
    .status-dot.offline  { background: #ef4444; box-shadow: 0 0 0 2px rgba(239,68,68,0.2); }
    .status-dot.checking { background: #f59e0b; box-shadow: 0 0 0 2px rgba(245,158,11,0.2); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,.05),0 10px 15px -3px rgba(0,0,0,.05); border: 1px solid rgba(226,232,240,.6); }
    .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: #334155; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .85rem; font-weight: 500; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .3px; }
    input, select { width: 100%; padding: 14px 16px; font-size: 1rem; border: 1.5px solid #e2e8f0; border-radius: 16px; background: #fafcff; transition: all .2s; font-family: 'Inter',sans-serif; color: #1e293b; }
    input:focus, select:focus { outline: none; border-color: #4a86e8; background: white; box-shadow: 0 0 0 4px rgba(74,134,232,.1); }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .button-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-top: 8px; }
    .btn { padding: 14px 10px; border: 1.5px solid #e2e8f0; border-radius: 16px; font-weight: 600; font-size: .95rem; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; background: white; color: #334155; font-family: 'Inter',sans-serif; }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }
    .btn-primary  { background: #4a86e8; border-color: #4a86e8; color: white; box-shadow: 0 4px 8px rgba(74,134,232,.25); }
    .btn-primary:hover:not(:disabled)  { background: #3b74d0; transform: scale(.98); }
    .btn-danger   { background: #fee2e2; border-color: #fecaca; color: #b91c1c; }
    .btn-danger:hover:not(:disabled)   { background: #fecaca; }
    .btn-success  { background: #d1fae5; border-color: #a7f3d0; color: #065f46; }
    .btn-warning  { background: #fef3c7; border-color: #fde68a; color: #92400e; }
    .btn-outline  { background: white; }

    .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
    .stat-card { background: #f8fafc; border-radius: 18px; padding: 16px; border: 1px solid #e2e8f0; }
    .stat-label { font-size: .8rem; color: #64748b; margin-bottom: 6px; font-weight: 500; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
    .revenue-card { grid-column: span 2; background: linear-gradient(135deg,#4a86e8,#6c5ce7); border: none; }
    .revenue-card .stat-label, .revenue-card .stat-value { color: white; }

    .table-wrapper { overflow-x: auto; border-radius: 18px; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th { text-align: left; padding: 12px 8px; background: #f1f5f9; font-weight: 600; color: #475569; }
    td { padding: 10px 8px; border-bottom: 1px solid #e2e8f0; }
    tr:last-child td { border-bottom: none; }
    .action-icon { background: none; border: none; font-size: 1rem; cursor: pointer; margin: 0 4px; color: #64748b; padding: 6px; border-radius: 50%; transition: background .2s; }
    .action-icon:hover { background: #e2e8f0; }

    .search-section { display: flex; gap: 8px; margin-bottom: 15px; }
    .search-section input { flex: 1; }

    /* ===== PAGINATION ===== */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #e2e8f0;
    }
    .rows-per-page {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .8rem;
      color: #64748b;
      white-space: nowrap;
    }
    .rows-per-page select {
      width: auto;
      padding: 6px 10px;
      font-size: .8rem;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      background: #fafcff;
      cursor: pointer;
    }
    .page-info {
      font-size: .8rem;
      color: #64748b;
      flex: 1;
      text-align: center;
      min-width: 80px;
    }
    .page-info strong { color: #334155; }
    .page-controls { display: flex; align-items: center; gap: 4px; }
    .page-btn {
      min-width: 34px;
      height: 34px;
      padding: 0 8px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      background: white;
      color: #475569;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      font-family: 'Inter',sans-serif;
    }
    .page-btn:hover:not(:disabled) { background: #f1f5f9; border-color: #cbd5e1; }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; }
    .page-btn.active { background: #4a86e8; border-color: #4a86e8; color: white; box-shadow: 0 2px 6px rgba(74,134,232,.35); }
    .page-btn.ellipsis { cursor: default; border-color: transparent; background: transparent; pointer-events: none; }
    /* ====================== */

    .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #1e293b; color: white; padding: 14px 20px; border-radius: 40px; font-weight: 500; box-shadow: 0 10px 25px rgba(0,0,0,.2); opacity: 0; transition: opacity .3s; pointer-events: none; text-align: center; max-width: 600px; margin: 0 auto; z-index: 999; }
    .toast.show  { opacity: 1; }
    .toast.error   { background: #b91c1c; }
    .toast.success { background: #065f46; }

    #currentRow { display: none; }

    /* Highlight pulse when form is populated */
    @keyframes formPulse {
      0%   { box-shadow: 0 0 0 0 rgba(74,134,232,0.45); }
      60%  { box-shadow: 0 0 0 10px rgba(74,134,232,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,134,232,0); }
    }
    .form-card-highlight {
      animation: formPulse 0.7s ease-out;
      border-color: #4a86e8 !important;
    }

    /* Search result panel styles */
    .search-result.found { border-color: #a7f3d0 !important; background: #f0fdf4; }
    .search-result.missed { border-color: #fecaca !important; background: #fff5f5; }
    .result-header.found { color: #065f46; }
    .result-header.missed { color: #b91c1c; }
  </style>
</head>
<body>
<div class="container">

  <div class="app-header">
    <h1>📦 InventoryForBabi</h1>
    <div class="connection-status">
      <span class="status-dot checking" id="statusDot"></span>
      <span id="statusText">Checking...</span>
    </div>
  </div>

  <!-- ENTRY FORM -->
  <div class="card" id="entryFormCard">
    <div class="card-title"><i class="fas fa-pen" style="color:#4a86e8"></i> Product Entry</div>
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" id="productName" placeholder="e.g., Coffee Beans" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Product ID / SKU</label>
      <input type="text" id="productId" placeholder="SKU-12345">
    </div>
    <div class="form-group">
      <label>Stock Quantity</label>
      <input type="number" id="stockQty" placeholder="0" value="0">
    </div>
    <div class="form-group">
      <label>Unit Price (₱)</label>
      <input type="number" id="unitPrice" placeholder="0.00" step="0.01">
    </div>
    <div class="form-group">
      <label>Sold Quantity (for sale update)</label>
      <input type="number" id="soldQty" placeholder="0" value="0">
    </div>
    <input type="hidden" id="currentRow" value="">
    <div class="button-grid">
      <button class="btn btn-primary"  id="saveBtn"><i class="fas fa-plus-circle"></i> Save</button>
      <button class="btn btn-success"  id="updateBtn"><i class="fas fa-sync-alt"></i> Update</button>
      <button class="btn btn-outline"  id="clearFormBtn"><i class="fas fa-eraser"></i> Clear</button>
      <button class="btn btn-danger"   id="deleteBtn"><i class="fas fa-trash-alt"></i> Delete</button>
      <button class="btn btn-danger"   id="clearAllBtn" style="grid-column:span 2"><i class="fas fa-dumpster"></i> Clear All Records</button>
    </div>
  </div>

  <!-- SEARCH CARD (NEW) -->
  <div class="card" id="searchCard">
    <div class="card-title"><i class="fas fa-search" style="color:#6c5ce7"></i> Search Product</div>
    <div style="display:flex; gap:10px; align-items:stretch;">
      <input type="text" id="skuSearchInput" placeholder="Enter Product ID / SKU…" style="flex:1;" autocomplete="off">
      <button class="btn btn-primary" id="skuSearchBtn" style="padding:14px 20px;"><i class="fas fa-search"></i> Search</button>
    </div>

    <!-- Result preview – hidden until search fires -->
    <div class="search-result" id="searchResult" style="display:none; margin-top:14px; border-radius:16px; border:1.5px solid #e2e8f0; background:#f8fafc; overflow:hidden;">
      <div class="result-header" id="resultHeader" style="display:flex; align-items:center; justify-content:space-between; padding:10px 14px; font-size:.82rem; font-weight:600;"></div>
      <div class="result-body" id="resultBody" style="display:grid; grid-template-columns:1fr 1fr; border-top:1px solid #e2e8f0;"></div>
      <div class="result-actions" id="resultActions" style="display:flex; gap:8px; padding:12px 14px; border-top:1px solid #e2e8f0;"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="card">
    <div class="card-title"><i class="fas fa-chart-pie" style="color:#6c5ce7"></i> Dashboard</div>
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-label"><i class="fas fa-boxes"></i> Total Stock</div>
        <div class="stat-value" id="totalStock">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"><i class="fas fa-truck"></i> Total Sold</div>
        <div class="stat-value" id="totalSold">0</div>
      </div>
      <div class="stat-card revenue-card">
        <div class="stat-label"><i class="fas fa-coins"></i> Total Revenue</div>
        <div class="stat-value" id="totalRevenue">₱0.00</div>
      </div>
    </div>
  </div>

  <!-- INVENTORY LIST -->
  <div class="card">
    <div class="card-title">
      <i class="fas fa-list-ul" style="color:#4a86e8"></i> Current Inventory
      <button id="refreshTableBtn" style="margin-left:auto;padding:6px 12px;border-radius:30px;border:1.5px solid #e2e8f0;background:white;cursor:pointer;font-size:.85rem;font-family:'Inter',sans-serif;color:#334155;">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>

    <div class="search-section">
      <input type="text" id="searchInput" placeholder="Search by name or ID...">
      <button class="btn btn-primary" id="searchTableBtn" style="padding:14px 18px"><i class="fas fa-search"></i></button>
    </div>

    <div class="table-wrapper">
      <table id="inventoryTable">
        <thead>
          <tr><th>Product</th><th>ID</th><th>Stock</th><th>Sold</th><th>Price</th><th></th></tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" style="text-align:center;padding:30px">Loading inventory...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- PAGINATION BAR -->
    <div class="pagination-bar" id="paginationBar">
      <div class="rows-per-page">
        Rows:
        <select id="rowsPerPageSelect">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="25">25</option>
          <option value="50">50</option>
        </select>
      </div>
      <div class="page-info" id="pageInfo">—</div>
      <div class="page-controls" id="pageControls"></div>
    </div>
  </div>
</div>
  
  <!-- FOOTER -->
<footer style="text-align: center; padding: 16px 0 8px; color: #94a3b8; font-size: 0.75rem; border-top: 1px solid #e2e8f0; margin-top: 8px;">
  <p>Developed by <strong style="color: #64748b;">Adriane Lorenz Racaza</strong> • IFB Management System v1.0</p>
  <p style="margin-top: 4px;">© 2026 All rights reserved.</p>
</footer>

</div>

<div id="toast" class="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const API_URL            = 'https://script.google.com/macros/s/AKfycby9UXxlHJeQ2Tk-JwoVcZMutH-rVkjtqZE5nkDXLzKFag2WNF7FrAxG25YLOgYxlv6Y/exec';
  const FETCH_TIMEOUT_MS   = 10000;
  const MAX_RETRIES        = 3;
  const HEARTBEAT_MS       = 30000;

  // ── PAGINATION STATE ─────────────────────────────────────
  let allRecords      = [];
  let filteredRecords = [];
  let currentPage     = 1;
  let rowsPerPage     = 10;

  // ── DOM ──────────────────────────────────────────────────
  const $  = id => document.getElementById(id);
  const productName    = $('productName');
  const productId      = $('productId');
  const stockQty       = $('stockQty');
  const unitPrice      = $('unitPrice');
  const soldQty        = $('soldQty');
  const currentRow     = $('currentRow');
  const tableBody      = $('tableBody');
  const totalStockEl   = $('totalStock');
  const totalSoldEl    = $('totalSold');
  const totalRevenueEl = $('totalRevenue');
  const toast          = $('toast');
  const statusDot      = $('statusDot');
  const statusText     = $('statusText');
  const pageInfo       = $('pageInfo');
  const pageControls   = $('pageControls');
  const rowsSelect     = $('rowsPerPageSelect');

  // ── STATUS ───────────────────────────────────────────────
  function setOnlineStatus(state) {
    statusDot.className  = 'status-dot' + (state === 'offline' ? ' offline' : state === 'checking' ? ' checking' : '');
    statusText.textContent = state === 'online' ? 'Connected' : state === 'checking' ? 'Checking...' : 'Offline';
  }

  // ── TOAST ────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'info') {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ── API ──────────────────────────────────────────────────
  async function fetchWithTimeout(url, ms) {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), ms);
    try {
      const res = await fetch(url, { method: 'GET', redirect: 'follow', signal: ctrl.signal });
      clearTimeout(tid); return res;
    } catch (e) { clearTimeout(tid); throw e; }
  }

  async function callApi(params, retries = MAX_RETRIES) {
    const url = new URL(API_URL);
    Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));

    for (let attempt = 1; attempt <= retries; attempt++) {
      try {
        const res  = await fetchWithTimeout(url.toString(), FETCH_TIMEOUT_MS);
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); }
        catch { throw new Error('Server returned an unexpected response. Check Apps Script logs.'); }
        if (!data.success) throw new Error(data.error || 'Request failed');
        return data;
      } catch (err) {
        if (attempt === retries) {
          const isNet = err.name === 'AbortError' || err.message === 'Failed to fetch' || err.message.includes('NetworkError');
          if (isNet) setOnlineStatus('offline');
          showToast(err.message, 'error');
          throw err;
        }
        await new Promise(r => setTimeout(r, 500 * attempt));
      }
    }
  }

  // ── LOAD ─────────────────────────────────────────────────
  async function loadInventory() {
    try {
      const data = await callApi({ action: 'getAll' });
      allRecords = data.data || [];
      applyFilter();
      updateDashboard(allRecords);
      setOnlineStatus('online');
    } catch (e) { /* handled in callApi */ }
  }

  // ── FILTER ───────────────────────────────────────────────
  function applyFilter() {
  const term = $('searchInput').value.toLowerCase().trim();
  filteredRecords = term
    ? allRecords.filter(r => {
        const name = (r.productName || '').toString().toLowerCase();
        const id   = (r.productId   || '').toString().toLowerCase();
        return name.includes(term) || id.startsWith(term);
      })
    : [...allRecords];
  currentPage = 1;
  renderPage();
}

  // ── RENDER PAGE ──────────────────────────────────────────
  function renderPage() {
    const total      = filteredRecords.length;
    const totalPages = Math.max(1, Math.ceil(total / rowsPerPage));
    if (currentPage > totalPages) currentPage = totalPages;

    const start    = (currentPage - 1) * rowsPerPage;
    const end      = Math.min(start + rowsPerPage, total);
    const pageRows = filteredRecords.slice(start, end);

    if (!total) {
      tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#94a3b8">No products found.</td></tr>';
    } else {
      tableBody.innerHTML = pageRows.map(r => `
        <tr>
          <td>${escapeHtml(r.productName || '')}</td>
          <td>${escapeHtml(r.productId   || '')}</td>
          <td>${r.stockQty || 0}</td>
          <td>${r.soldQty  || 0}</td>
          <td>₱${(Number(r.unitPrice) || 0).toFixed(2)}</td>
          <td>
            <button class="action-icon" onclick="editRecord('${escapeAttr(r.productId)}')"><i class="fas fa-edit"></i></button>
            <button class="action-icon" onclick="deleteRecordById('${escapeAttr(r.productId)}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`).join('');
    }

    pageInfo.innerHTML = total === 0
      ? 'No results'
      : `Showing <strong>${start + 1}–${end}</strong> of <strong>${total}</strong>`;

    renderPageControls(totalPages);
  }

  function renderPageControls(totalPages) {
    const pages = getPageWindow(currentPage, totalPages);
    let html = '';
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">
               <i class="fas fa-chevron-left" style="font-size:.7rem"></i>
             </button>`;
    pages.forEach(p => {
      if (p === '…') {
        html += `<button class="page-btn ellipsis" disabled>…</button>`;
      } else {
        html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
      }
    });
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">
               <i class="fas fa-chevron-right" style="font-size:.7rem"></i>
             </button>`;
    pageControls.innerHTML = html;
  }

  function getPageWindow(current, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    const pages = [];
    const left  = Math.max(2, current - 1);
    const right = Math.min(total - 1, current + 1);
    pages.push(1);
    if (left > 2)          pages.push('…');
    for (let i = left; i <= right; i++) pages.push(i);
    if (right < total - 1) pages.push('…');
    pages.push(total);
    return pages;
  }

  function goToPage(page) {
    const totalPages = Math.max(1, Math.ceil(filteredRecords.length / rowsPerPage));
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderPage();
    $('inventoryTable').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function updateDashboard(records) {
    let ts = 0, tSold = 0, tRev = 0;
    records.forEach(r => {
      ts    += Number(r.stockQty) || 0;
      tSold += Number(r.soldQty)  || 0;
      tRev  += (Number(r.soldQty) || 0) * (Number(r.unitPrice) || 0);
    });
    totalStockEl.textContent   = ts;
    totalSoldEl.textContent    = tSold;
    totalRevenueEl.textContent = `₱${tRev.toFixed(2)}`;
  }

  function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
  function escapeAttr(t) { return String(t).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

  function scrollToForm() {
    const card = $('entryFormCard');
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    card.classList.remove('form-card-highlight');
    void card.offsetWidth;
    card.classList.add('form-card-highlight');
    card.addEventListener('animationend', () => card.classList.remove('form-card-highlight'), { once: true });
    setTimeout(() => productName.focus(), 400);
  }

  function clearForm() {
    productName.value = ''; productId.value = '';
    stockQty.value = '0';   unitPrice.value = '';
    soldQty.value  = '0';   currentRow.value = '';
    clearSearchResult();
  }

  // ── SEARCH UI (NEW) ───────────────────────────────────────
  function clearSearchResult() {
    const panel = $('searchResult');
    panel.style.display = 'none';
    panel.className = 'search-result';
    $('resultBody').innerHTML = '';
    $('resultActions').innerHTML = '';
  }

  async function skuSearch() {
    const sku = $('skuSearchInput').value.trim();
    if (!sku) { showToast('Enter a Product ID to search.', 'error'); return; }

    const panel   = $('searchResult');
    const header  = $('resultHeader');
    const body    = $('resultBody');
    const actions = $('resultActions');

    panel.style.display = 'block';
    panel.className = 'search-result';
    header.className = 'result-header';
    header.innerHTML = '<span><i class="fas fa-spinner fa-spin"></i> Searching…</span>';
    body.innerHTML   = '';
    actions.innerHTML = '';

    try {
      const data = await callApi({ action: 'search', sku });
      if (data.found) {
        const r = data.record;
        panel.className   = 'search-result found';
        header.className  = 'result-header found';
        header.innerHTML  = `<span><i class="fas fa-check-circle"></i> Product found</span><span style="font-weight:400;color:#047857">${escapeHtml(r.productId)}</span>`;
        body.innerHTML = `
          <div class="result-field" style="padding:8px 14px; border-right:1px solid #e2e8f0; border-bottom:1px solid #e2e8f0;">
            <div style="font-size:.72rem; color:#94a3b8; text-transform:uppercase;">Product Name</div>
            <div style="font-size:.92rem; font-weight:600;">${escapeHtml(r.productName || '—')}</div>
          </div>
          <div class="result-field" style="padding:8px 14px; border-bottom:1px solid #e2e8f0;">
            <div style="font-size:.72rem; color:#94a3b8; text-transform:uppercase;">SKU</div>
            <div style="font-size:.92rem; font-weight:600;">${escapeHtml(r.productId || '—')}</div>
          </div>
          <div class="result-field" style="padding:8px 14px; border-right:1px solid #e2e8f0;">
            <div style="font-size:.72rem; color:#94a3b8; text-transform:uppercase;">Unit Price</div>
            <div style="font-size:.92rem; font-weight:600;">₱${(Number(r.unitPrice) || 0).toFixed(2)}</div>
          </div>
          <div class="result-field" style="padding:8px 14px;">
            <div style="font-size:.72rem; color:#94a3b8; text-transform:uppercase;">Current Stock</div>
            <div style="font-size:.92rem; font-weight:600;">${r.stockQty || 0}</div>
          </div>`;
        panel.dataset.row        = data.row;
        panel.dataset.productName = r.productName || '';
        panel.dataset.productId   = r.productId   || '';
        panel.dataset.unitPrice   = r.unitPrice    || '';
        panel.dataset.stockQty    = r.stockQty     || 0;
        actions.innerHTML = `
          <button class="btn btn-success" onclick="loadFoundRecord()"><i class="fas fa-edit"></i> Load to Form</button>
          <button class="btn btn-danger"  onclick="deleteFoundRecord()"><i class="fas fa-trash-alt"></i> Delete</button>`;
      } else {
        panel.className  = 'search-result missed';
        header.className = 'result-header missed';
        header.innerHTML = `<span><i class="fas fa-times-circle"></i> No product found for "<strong>${escapeHtml(sku)}</strong>"</span>`;
        actions.innerHTML = `<button class="btn btn-outline" style="flex:1" onclick="clearSearchResult(); $('skuSearchInput').focus()"><i class="fas fa-redo"></i> Try Again</button>`;
      }
    } catch (e) {
      panel.style.display = 'none';
    }
  }

  function loadFoundRecord() {
    const panel = $('searchResult');
    productName.value = panel.dataset.productName;
    productId.value   = panel.dataset.productId;
    stockQty.value    = panel.dataset.stockQty;
    unitPrice.value   = panel.dataset.unitPrice;
    soldQty.value     = '0';
    currentRow.value  = panel.dataset.row;
    showToast('Record loaded — ready to update.', 'success');
    scrollToForm();
    clearSearchResult();
    $('skuSearchInput').value = '';
  }

  async function deleteFoundRecord() {
    const panel = $('searchResult');
    const sku   = panel.dataset.productId;
    if (!confirm(`Delete product "${sku}"? This cannot be undone.`)) return;
    try {
      await callApi({ action: 'delete', row: panel.dataset.row });
      showToast(`"${sku}" deleted.`, 'success');
      clearSearchResult();
      $('skuSearchInput').value = '';
      clearForm();
      loadInventory();
    } catch (e) {}
  }

  // ── CRUD ─────────────────────────────────────────────────
  async function saveRecord() {
    if (!productId.value || !productName.value) { showToast('Product ID and Name are required', 'error'); return; }
    try {
      await callApi({ action: 'save', productName: productName.value, productId: productId.value, stockQty: stockQty.value, unitPrice: unitPrice.value });
      showToast('Item saved successfully!', 'success');
      clearForm(); loadInventory();
    } catch (e) {}
  }

  async function updateRecord() {
    if (!currentRow.value) { showToast('Load a record first using Search.', 'error'); return; }
    try {
      await callApi({ action: 'update', row: currentRow.value, productName: productName.value, productId: productId.value, stockQty: stockQty.value, unitPrice: unitPrice.value, soldQty: soldQty.value });
      showToast('Record updated!', 'success');
      clearForm(); loadInventory();
    } catch (e) {}
  }

  async function deleteRecord() {
    if (!currentRow.value) { showToast('Load a record first using Search.', 'error'); return; }
    if (!confirm('Permanently delete this item?')) return;
    try {
      await callApi({ action: 'delete', row: currentRow.value });
      showToast('Record deleted.', 'success');
      clearForm(); loadInventory();
    } catch (e) {}
  }

  async function deleteRecordById(sku) {
    if (!confirm(`Delete product ${sku}?`)) return;
    try {
      const data = await callApi({ action: 'search', sku });
      if (data.found) {
        await callApi({ action: 'delete', row: data.row });
        showToast('Deleted.', 'success');
        clearForm();
        scrollToForm();
        loadInventory();
      }
    } catch (e) {}
  }

  async function editRecord(sku) {
    try {
      const data = await callApi({ action: 'search', sku });
      if (data.found) {
        const r = data.record;
        productName.value = r.productName; productId.value = r.productId;
        stockQty.value    = r.stockQty;    unitPrice.value  = r.unitPrice;
        soldQty.value     = '0';           currentRow.value = data.row;
        showToast('Record loaded for editing.', 'success');
        scrollToForm();
      }
    } catch (e) {}
  }

  async function clearAllRecords() {
    if (!confirm('DELETE ALL INVENTORY RECORDS? This cannot be undone!')) return;
    try {
      await callApi({ action: 'clearAll' });
      showToast('All records cleared.', 'success');
      loadInventory();
    } catch (e) {}
  }

  // ── EVENTS ───────────────────────────────────────────────
  $('saveBtn').addEventListener('click', saveRecord);
  $('updateBtn').addEventListener('click', updateRecord);
  $('deleteBtn').addEventListener('click', deleteRecord);
  $('clearFormBtn').addEventListener('click', clearForm);
  $('clearAllBtn').addEventListener('click', clearAllRecords);
  $('refreshTableBtn').addEventListener('click', loadInventory);
  $('searchTableBtn').addEventListener('click', applyFilter);
  $('searchInput').addEventListener('input', applyFilter);
  $('skuSearchBtn').addEventListener('click', skuSearch);
  $('skuSearchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') skuSearch(); });

  rowsSelect.addEventListener('change', () => {
    rowsPerPage = parseInt(rowsSelect.value, 10);
    currentPage = 1;
    renderPage();
  });

  setInterval(async () => { setOnlineStatus('checking'); await loadInventory(); }, HEARTBEAT_MS);
  loadInventory();

  // Expose global functions
  window.editRecord         = editRecord;
  window.deleteRecordById   = deleteRecordById;
  window.goToPage           = goToPage;
  window.loadFoundRecord    = loadFoundRecord;
  window.deleteFoundRecord  = deleteFoundRecord;
  window.clearSearchResult  = clearSearchResult;
</script>
</body>
</html>
